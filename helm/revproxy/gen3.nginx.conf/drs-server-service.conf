# drs-server replacement for indexd/fence-compatible routes
location /ga4gh/ {
    if ($csrf_check !~ ^ok-\S.+$) {
      return 403 "failed csrf check";
    }

    set $proxy_service "drs-server";
    set $upstream http://drs-server$des_domain:8080;

    proxy_pass $upstream;
    proxy_redirect http://$host/ https://$host/;
}

location /index/ {
    if ($csrf_check !~ ^ok-\S.+$) {
      return 403 "failed csrf check";
    }

    set $proxy_service "drs-server";
    set $upstream http://drs-server$des_domain:8080;

    # drs-server already exposes /index/* paths, so no rewrite needed.
    # If your callers use old indexd-style prefixing behavior, uncomment:
    # rewrite ^/index/(.*) /$1 break;

    proxy_pass $upstream;
    proxy_redirect http://$host/ https://$host/index/;
}

