location /gecko/health {
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    set $proxy_service  "gecko-health";
    set $upstream http://gecko-service.$namespace.svc.cluster.local;

    rewrite ^/gecko/health$ /health break;
    proxy_pass $upstream;
}

location = /gecko/projects/list {
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    set $proxy_service "gecko-project-list";

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    include /etc/nginx/snippets/gen3-authenticated-proxy-headers.conf;

    proxy_pass http://gecko-service.$namespace.svc.cluster.local/config/projects/list$is_args$args;
    client_max_body_size 0;
}


location = /gecko/git/github/callback {
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    set $proxy_service "gecko-git-callback";
    set $upstream http://gecko-service.$namespace.svc.cluster.local;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    include /etc/nginx/snippets/gen3-authenticated-proxy-headers.conf;

    rewrite ^/gecko/git/github/callback$ /git/github/callback break;
    proxy_pass $upstream$is_args$args;
    client_max_body_size 0;
}

location ^~ /gecko/git/ {
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    set $proxy_service "gecko-git";
    set $upstream http://gecko-service.$namespace.svc.cluster.local;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    include /etc/nginx/snippets/gen3-authenticated-proxy-headers.conf;

    rewrite ^/gecko/git/(.*)$ /git/$1 break;
    proxy_pass $upstream$is_args$args;
    client_max_body_size 0;
}

location /gecko/ {
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    set $proxy_service  "gecko";
    set $upstream http://gecko-service.$namespace.svc.cluster.local;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    include /etc/nginx/snippets/gen3-authenticated-proxy-headers.conf;

    rewrite ^/gecko/(.*)$ /config/$1 break;
    proxy_pass $upstream$is_args$args;
    client_max_body_size 0;
}

