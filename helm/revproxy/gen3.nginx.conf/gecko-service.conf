location /gecko/health {
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    set $proxy_service  "gecko-health";
    set $upstream http://gecko-service.$namespace.svc.cluster.local;

    rewrite ^/gecko/health$ /health break;
    proxy_pass $upstream;
}

location = /gecko/projects/list {
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    set $proxy_service "gecko-project-list";

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization "$access_token";
    proxy_set_header X-UserId "$userid";
    proxy_set_header X-ReqId "$request_id";
    proxy_set_header X-SessionId "$session_id";
    proxy_set_header X-VisitorId "$visitor_id";

    proxy_pass http://gecko-service.$namespace.svc.cluster.local/config/projects/list$is_args$args;
    client_max_body_size 0;
}

location ~ ^/gecko/organization/([^/]+)/project/([^/]+)$ {
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    set $proxy_service  "gecko-project";
