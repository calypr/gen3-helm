# Loom's chart exposes the server as loom-loom on a standalone release.
# Keep the public /loom prefix out of Loom's own route matching.
location = /loom {
    return 308 /loom/;
}

location ^~ /loom/ {
    set $proxy_service "loom";
    set $upstream http://loom-loom.$namespace.svc.cluster.local:8080;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    include /etc/nginx/snippets/gen3-authenticated-proxy-headers.conf;

    rewrite ^/loom/(.*)$ /$1 break;
    proxy_pass $upstream;

    # Generation uploads are complete META bundles and may be large. Stream
    # both uploads and NDJSON exports without proxy buffering.
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_connect_timeout 600s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
}
