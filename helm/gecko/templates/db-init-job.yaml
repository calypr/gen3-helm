{{- if .Values.postgres.initJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-db-init-%s" (include "gecko.dbInitName" . | trunc 45 | trimSuffix "-") (include (print $.Template.BasePath "/job-db-init.yaml") . | sha256sum | trunc 8) }}
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: gen3job
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: {{ .Values.postgres.initJob.image | quote }}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              INIT_DATA_PATH="/mnt/db-init-data"

              echo "Waiting for database to be ready..."
              until psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -c "SELECT 1"; do
                echo "Database not ready yet, waiting..."
                sleep 5
              done

              echo "Database ready, initializing..."

              psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" <<EOF
              CREATE SCHEMA IF NOT EXISTS config_schema;
              CREATE OR REPLACE FUNCTION create_config_table(table_name TEXT)
              RETURNS void AS '
              BEGIN
                  EXECUTE format(''
                      CREATE TABLE IF NOT EXISTS config_schema.%I (
                          name VARCHAR(255) PRIMARY KEY,
                          content JSONB
                      );
                  '', table_name);
              END;
              ' LANGUAGE plpgsql;

              SELECT create_config_table('explorer');
              SELECT create_config_table('nav');
              SELECT create_config_table('file_summary');
              SELECT create_config_table('apps_page');
              SELECT create_config_table('projects');

              DROP FUNCTION create_config_table(TEXT);
              EOF

              echo "Inserting initial configuration data from ConfigMap..."

              insert_config() {
                table_name="$1"
                config_name="$2"
                config_file="$3"

                psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" <<SQL
              INSERT INTO config_schema.${table_name} (name, content)
              VALUES (
                '${config_name}',
                \$json\$
              $(cat "${config_file}")
                \$json\$::jsonb
              )
              ON CONFLICT (name) DO UPDATE SET content = EXCLUDED.content;
              SQL
              }

              insert_config nav 1 "${INIT_DATA_PATH}/nav.json"
              insert_config file_summary 1 "${INIT_DATA_PATH}/file_summary.json"
              insert_config apps_page 1 "${INIT_DATA_PATH}/apps_page.json"

              psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" <<SQL
              DO \$do\$
              BEGIN
                IF EXISTS (
                  SELECT 1
                  FROM jsonb_array_elements(\$json\$
              $(cat "${INIT_DATA_PATH}/projects.json")
              \$json\$::jsonb) AS project
                  WHERE project->>'org_title' IS NULL
                    OR project->>'org_title' = ''
                    OR project->>'project_title' IS NULL
                    OR project->>'project_title' = ''
                ) THEN
                  RAISE EXCEPTION 'Every Gecko project config in .Values.projects must set org_title and project_title';
                END IF;
              END
              \$do\$;

              INSERT INTO config_schema.projects (name, content)
              SELECT concat(project->>'org_title', '/', project->>'project_title'), project
              FROM jsonb_array_elements(\$json\$
              $(cat "${INIT_DATA_PATH}/projects.json")
              \$json\$::jsonb) AS project
              ON CONFLICT (name) DO UPDATE SET content = EXCLUDED.content;
              SQL

              echo "Database initialization complete."
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: host
                  optional: false
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: port
                  optional: false
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: username
                  optional: false
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: password
                  optional: false
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: database
                  optional: false
            - name: PGSSLMODE
              value: "disable"
          volumeMounts:
            # Mount the ConfigMap containing the JSON files
            - name: db-init-data-volume
              mountPath: /mnt/db-init-data
              readOnly: true

      # Define the volume that pulls content from the ConfigMap
      volumes:
        - name: db-init-data-volume
          configMap:
            name: {{ include "gecko.dbInitName" . }}-db-init-data
            optional: false

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
