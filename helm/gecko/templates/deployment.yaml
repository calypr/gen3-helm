apiVersion: apps/v1
kind: Deployment
metadata:
  name: gecko-deployment
  labels:
    {{- include "gecko.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "gecko.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "gecko.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gecko.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{- if eq .name "JWKS_ENDPOINT" }}
                {{ default (printf "https://%s/user/.well-known/jwks" $.Values.global.hostname) .value | quote }}
              {{- else if eq .name "FENCE_BASE_URL" }}
                {{ default (printf "https://%s/user" $.Values.global.hostname) .value | quote }}
              {{- else }}
                {{ .value | quote }}
              {{- end }}
            {{- end }}
            - name: GRIP_GRAPH
              valueFrom:
                configMapKeyRef:
                  name: grip-values
                  key: graphName
            - name: GRIP_HOST
              valueFrom:
                configMapKeyRef:
                  name: grip-values
                  key: serviceName
            - name: GRIP_PORT
              value: "8202"
            {{- if .Values.qdrant.enabled }}
            - name: QDRANT_HOST
              value: {{ printf "%s-qdrant" .Release.Name | quote }}
            - name: QDRANT_PORT
              value: {{ .Values.qdrant.port | quote }}
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.qdrant.apiKeySecretName | quote }}
                  key: {{ .Values.qdrant.apiKeySecretKey | quote }}
                  optional: false
            {{- end }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: password
                  optional: false
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: username
                  optional: false
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: database
                  optional: false
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: host
                  optional: false
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: port
                  optional: false
            - name: PGSSLMODE
              value: disable
            - name: DBREADY
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: dbcreated
                  optional: false

          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml .Values.volumeMounts | nindent 12 }}  
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
