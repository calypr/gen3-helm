apiVersion: apps/v1
kind: Deployment
metadata:
  name: gecko-deployment
  labels:
    {{- include "gecko.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "gecko.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "gecko.selectorLabels" . | nindent 8 }}
    spec:
      {{- if or .Values.gitMirrorStorage.enabled .Values.volumes }}
      volumes:
        {{- if .Values.gitMirrorStorage.enabled }}
        - name: git-mirror-storage
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-git-mirror" (include "gecko.fullname" .)) .Values.gitMirrorStorage.existingClaim }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gecko.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if and .Values.storageChainAuditCache.enabled .Values.storageChainAuditCache.waitForRedis.enabled }}
      initContainers:
        - name: wait-for-audit-cache
          image: {{ .Values.storageChainAuditCache.waitForRedis.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storageChainAuditCache.passwordSecretName | quote }}
                  key: {{ .Values.storageChainAuditCache.passwordKey | quote }}
                  optional: false
          command:
            - /bin/sh
            - -c
            - |
              until redis-cli -h {{ .Values.storageChainAuditCache.waitForRedis.host }} -p {{ .Values.storageChainAuditCache.waitForRedis.port }} -a "$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG; do
                echo "waiting for storage-chain audit cache redis at {{ .Values.storageChainAuditCache.waitForRedis.host }}:{{ .Values.storageChainAuditCache.waitForRedis.port }}"
                sleep 2
              done
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "gecko.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            {{- if .Values.goRuntime.enabled }}
            - name: GOMEMLIMIT
              value: {{ .Values.goRuntime.memoryLimit | quote }}
            - name: GOGC
              value: {{ .Values.goRuntime.gcPercent | quote }}
            {{- end }}
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{- if eq .name "JWKS_ENDPOINT" }}
                {{ default (printf "https://%s/user/.well-known/jwks" $.Values.global.hostname) .value | quote }}
              {{- else if eq .name "FENCE_BASE_URL" }}
                {{ default (printf "https://%s/user" $.Values.global.hostname) .value | quote }}
              {{- else if eq .name "SYFON_DATA_API_BASE_URL" }}
                {{ default (printf "https://%s/data" $.Values.global.hostname) .value | quote }}
              {{- else }}
                {{ .value | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.storageChainAuditCache.enabled }}
            - name: STORAGE_CHAIN_AUDIT_CACHE_ENABLED
              value: "true"
            - name: STORAGE_CHAIN_AUDIT_CACHE_REDIS_URL
              value: {{ .Values.storageChainAuditCache.redisUrl | quote }}
            - name: STORAGE_CHAIN_AUDIT_CACHE_TTL_SECONDS
              value: {{ .Values.storageChainAuditCache.ttlSeconds | quote }}
            - name: STORAGE_CHAIN_AUDIT_CACHE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storageChainAuditCache.passwordSecretName | quote }}
                  key: {{ .Values.storageChainAuditCache.passwordKey | quote }}
                  optional: false
            {{- else }}
            - name: STORAGE_CHAIN_AUDIT_CACHE_ENABLED
              value: "false"
            {{- end }}
            - name: GRIP_GRAPH
              valueFrom:
                configMapKeyRef:
                  name: grip-values
                  key: graphName
            - name: GRIP_HOST
              valueFrom:
                configMapKeyRef:
                  name: grip-values
                  key: serviceName
            - name: GRIP_PORT
              value: "8202"
            {{- if .Values.qdrant.enabled }}
            - name: QDRANT_HOST
              value: {{ printf "%s-qdrant" .Release.Name | quote }}
            - name: QDRANT_PORT
              value: {{ .Values.qdrant.port | quote }}
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.qdrant.apiKeySecretName | quote }}
                  key: {{ .Values.qdrant.apiKeySecretKey | quote }}
                  optional: false
            {{- end }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: password
                  optional: false
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: username
                  optional: false
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: database
                  optional: false
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: host
                  optional: false
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: port
                  optional: false
            - name: PGSSLMODE
              value: disable
            - name: DBREADY
              valueFrom:
                secretKeyRef:
                  name: gecko-dbcreds
                  key: dbcreated
                  optional: false
            - name: GIT_DATA_DIR
              value: {{ if .Values.gitMirrorStorage.enabled }}{{ .Values.gitMirrorStorage.mountPath | quote }}{{ else }}"/tmp/gecko-git"{{ end }}

          {{- if or .Values.gitMirrorStorage.enabled .Values.volumeMounts }}
          volumeMounts:
            {{- if .Values.gitMirrorStorage.enabled }}
            - name: git-mirror-storage
              mountPath: {{ .Values.gitMirrorStorage.mountPath | quote }}
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
