# Example overrides for a VM-hosted external nginx that forwards into the
# in-cluster revproxy over stable NodePorts.
#
# Apply with:
# helm upgrade --install <release> ./helm/gen3 -f helm/gen3/ci/revproxy-vm-values.yaml
#
# Keep local Docker Desktop/kind/minikube setups on their own values file instead
# of adding a generic "vm" switch to the chart.

revproxy:
  replicaCount: 2
  service:
    type: NodePort
    port:
      - protocol: TCP
        port: 80
        targetPort: 80
        nodePort: 31551
        name: http
      - protocol: TCP
        port: 443
        targetPort: 443
        nodePort: 30912
        name: https
