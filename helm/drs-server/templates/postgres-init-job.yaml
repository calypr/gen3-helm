{{- if .Values.postgres.initJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "drs-server.fullname" . }}-postgres-init
  labels:
    {{- include "drs-server.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "drs-server.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: postgres-init
          image: {{ .Values.postgres.initJob.image }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export PGPASSWORD="${PG_ADMIN_PASSWORD}"

              max_wait_seconds="${PG_WAIT_TIMEOUT_SECONDS:-180}"
              waited_seconds=0
              until pg_isready -h "${PG_ADMIN_HOST}" -p "${PG_ADMIN_PORT}" -U "${PG_ADMIN_USER}"; do
                if [ "${waited_seconds}" -ge "${max_wait_seconds}" ]; then
                  echo "Timed out after ${max_wait_seconds}s waiting for PostgreSQL at ${PG_ADMIN_HOST}:${PG_ADMIN_PORT}"
                  exit 1
                fi
                echo "Waiting for PostgreSQL at ${PG_ADMIN_HOST}:${PG_ADMIN_PORT}... (${waited_seconds}s/${max_wait_seconds}s)"
                sleep 2
                waited_seconds=$((waited_seconds + 2))
              done

              psql -h "${PG_ADMIN_HOST}" -p "${PG_ADMIN_PORT}" -U "${PG_ADMIN_USER}" -d "${PG_ADMIN_DB}" -v ON_ERROR_STOP=1 \
                -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='${DRS_DB_USER}') THEN CREATE ROLE \"${DRS_DB_USER}\" LOGIN PASSWORD '${DRS_DB_PASSWORD}'; ELSE ALTER ROLE \"${DRS_DB_USER}\" WITH LOGIN PASSWORD '${DRS_DB_PASSWORD}'; END IF; END \$\$;"

              if ! psql -h "${PG_ADMIN_HOST}" -p "${PG_ADMIN_PORT}" -U "${PG_ADMIN_USER}" -d "${PG_ADMIN_DB}" -tAc "SELECT 1 FROM pg_database WHERE datname='${DRS_DB_NAME}'" | grep -q 1; then
                psql -h "${PG_ADMIN_HOST}" -p "${PG_ADMIN_PORT}" -U "${PG_ADMIN_USER}" -d "${PG_ADMIN_DB}" -v ON_ERROR_STOP=1 \
                  -c "CREATE DATABASE \"${DRS_DB_NAME}\" OWNER \"${DRS_DB_USER}\";"
              fi

              psql -h "${PG_ADMIN_HOST}" -p "${PG_ADMIN_PORT}" -U "${PG_ADMIN_USER}" -d "${PG_ADMIN_DB}" -v ON_ERROR_STOP=1 \
                -c "GRANT ALL PRIVILEGES ON DATABASE \"${DRS_DB_NAME}\" TO \"${DRS_DB_USER}\";"

              export PGPASSWORD="${DRS_DB_PASSWORD}"
              psql -h "${DRS_DB_HOST}" -p "${DRS_DB_PORT}" -U "${DRS_DB_USER}" -d "${DRS_DB_NAME}" -v ON_ERROR_STOP=1 -f /sql/drs_schema.sql
          env:
            - name: PG_WAIT_TIMEOUT_SECONDS
              value: {{ .Values.postgres.initJob.waitTimeoutSeconds | quote }}
            - name: DRS_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "drs-server.appDbSecretName" . }}
                  key: db_host
            - name: DRS_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "drs-server.appDbSecretName" . }}
                  key: db_port
            - name: DRS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "drs-server.appDbSecretName" . }}
                  key: db_username
            - name: DRS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "drs-server.appDbSecretName" . }}
                  key: db_password
            - name: DRS_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "drs-server.appDbSecretName" . }}
                  key: db_database
            - name: PG_ADMIN_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "drs-server.adminDbSecretName" . }}
                  key: host
            - name: PG_ADMIN_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "drs-server.adminDbSecretName" . }}
                  key: port
            - name: PG_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "drs-server.adminDbSecretName" . }}
                  key: username
            - name: PG_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "drs-server.adminDbSecretName" . }}
                  key: password
            - name: PG_ADMIN_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "drs-server.adminDbSecretName" . }}
                  key: database
          volumeMounts:
            - name: schema
              mountPath: /sql
      volumes:
        - name: schema
          configMap:
            name: {{ include "drs-server.fullname" . }}-postgres-schema
{{- end }}
