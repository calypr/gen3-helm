{{- $cfg := (.Values.config | default dict) -}}
{{- if empty $cfg -}}
{{- $global := (.Values.global | default dict) -}}
{{- $globalDrsHyphen := (get $global "drs-server" | default dict) -}}
{{- $globalDrsCamel := (get $global "drsServer" | default dict) -}}
{{- $globalCfgHyphen := (get $globalDrsHyphen "config" | default dict) -}}
{{- $globalCfgCamel := (get $globalDrsCamel "config" | default dict) -}}
{{- $cfg = (coalesce $globalCfgHyphen $globalCfgCamel dict) -}}
{{- end -}}
{{- $basic := (get $cfg "basicAuth" | default dict) -}}
{{- $basicUser := (get $basic "username" | default "") -}}
{{- $basicPass := (get $basic "password" | default "") -}}
{{- $s3 := (get $cfg "s3Credentials" | default list) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "drs-server.fullname" . }}-config
  labels:
    {{- include "drs-server.labels" . | nindent 4 }}
data:
  config.yaml: |
    port: {{ (get $cfg "port" | default 8080) }}
    auth:
      mode: {{ (get $cfg "authMode" | default "gen3") | quote }}
      {{- if and $basicUser $basicPass }}
      basic:
        username: {{ $basicUser | quote }}
        password: {{ $basicPass | quote }}
      {{- end }}
    {{- if $s3 }}
    s3_credentials:
{{ toYaml $s3 | indent 6 }}
    {{- end }}
