fullnameOverride: syfon

replicaCount: 1

image:
  repository: quay.io/ohsu-comp-bio/syfon
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

config:
  port: 8080
  auth:
    mode: gen3
    # Public Fence endpoint used to validate Gen3 token issuers and fetch /user/user privileges.
    # Defaults to https://<global.hostname>/user when omitted.
    fence_url: ""
  routes:
    docs: true
    ga4gh: true
    internal: true
    lfs: true
    metrics: true
  signing:
    default_expiry_seconds: 900
  credential_encryption: {}
  # Preferred Syfon config shape. Buckets are credentials; Syfon derives the
  # internal credential key from provider/endpoint/bucket/region/access_key.
  buckets: []
  # Legacy inputs are still accepted by Syfon. bucket_scopes use physical bucket
  # plus organization/project_id/path_prefix.
  s3_credentials: []
  bucket_scopes: []

# Backward-compatible shorthand accepted by the chart and rendered into
# config.credential_encryption. Prefer config.credential_encryption for new
# values, but existing local values often set this at syfon.credential_encryption.
credential_encryption: {}

credentialEncryption:
  # Refuse to deploy without a stable credential encryption key. Without this,
  # Syfon falls back to /app/.syfon-credential-kek, which is pod-local unless the
  # operator explicitly persists it.
  requireStableKey: true

postgres:
  app:
    existingSecret: ""
    secretName: syfon-db
    db_host: ""
    db_port: ""
    db_username: syfon_user
    db_password: syfon_pass
    db_database: syfon_db
    db_sslmode: disable
  admin:
    existingSecret: ""
    secretName: syfon-db-admin
    host: ""
    port: ""
    username: ""
    password: ""
    database: postgres
  initJob:
    enabled: true
    image: postgres:16
    waitTimeoutSeconds: 180

serviceCreds:
  enabled: true
  secretName: indexd-service-creds
  users:
    fence: ""
    sheepdog: ""

resources: {}

extraEnv: []

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
