fullnameOverride: syfon

replicaCount: 1

image:
  repository: quay.io/ohsu-comp-bio/syfon
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

config:
  port: 8080
  auth:
    mode: gen3
  routes:
    docs: true
    ga4gh: true
    internal: true
    lfs: true
    metrics: true
  signing:
    default_expiry_seconds: 900
  credential_encryption: {}
  # s3_credentials are passed through to Syfon directly. The chart also derives
  # bucket_scopes from per-credential `resources` entries and normalizes
  # `project` -> `project_id`, `org_path` -> `organization_sub_path`, and
  # `project_path` -> `project_sub_path` in the rendered config.
  s3_credentials: []
  bucket_scopes: []

postgres:
  app:
    existingSecret: ""
    secretName: syfon-db
    db_host: ""
    db_port: ""
    db_username: syfon_user
    db_password: syfon_pass
    db_database: syfon_db
    db_sslmode: disable
  admin:
    existingSecret: ""
    secretName: syfon-db-admin
    host: ""
    port: ""
    username: ""
    password: ""
    database: postgres
  initJob:
    enabled: true
    image: postgres:16
    waitTimeoutSeconds: 180

resources: {}

extraEnv: []

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
