{{- $cfg := deepCopy (.Values.config | default dict) -}}
{{- $inputCreds := default (list) (index $cfg "s3_credentials") -}}
{{- $renderCreds := list -}}
{{- $existingScopes := list -}}
{{- $derivedScopes := list -}}
{{- range $scope := default (list) (index $cfg "bucket_scopes") }}
  {{- $normalized := omit (deepCopy $scope) "org_path" "project_path" -}}
  {{- if and (hasKey $scope "org_path") (not (hasKey $normalized "organization_sub_path")) }}
    {{- $_ := set $normalized "organization_sub_path" (index $scope "org_path") -}}
  {{- end }}
  {{- if and (hasKey $scope "project_path") (not (hasKey $normalized "project_sub_path")) }}
    {{- $_ := set $normalized "project_sub_path" (index $scope "project_path") -}}
  {{- end }}
  {{- if and (hasKey $normalized "project") (not (hasKey $normalized "project_id")) }}
    {{- $_ := set $normalized "project_id" (index $normalized "project") -}}
  {{- end }}
  {{- $existingScopes = append $existingScopes (omit $normalized "project") -}}
{{- end }}
{{- range $cred := $inputCreds }}
  {{- $renderCred := omit (deepCopy $cred) "resources" -}}
  {{- $renderCreds = append $renderCreds $renderCred -}}
  {{- $credBucket := default "" (index $cred "bucket") -}}
  {{- range $resource := default (list) (index $cred "resources") }}
    {{- $derived := omit (deepCopy $resource) "org_path" "project_path" -}}
    {{- $_ := set $derived "bucket" $credBucket -}}
    {{- if and (hasKey $resource "org_path") (not (hasKey $derived "organization_sub_path")) }}
      {{- $_ := set $derived "organization_sub_path" (index $resource "org_path") -}}
    {{- end }}
    {{- if and (hasKey $resource "project_path") (not (hasKey $derived "project_sub_path")) }}
      {{- $_ := set $derived "project_sub_path" (index $resource "project_path") -}}
    {{- end }}
    {{- if and (hasKey $derived "project") (not (hasKey $derived "project_id")) }}
      {{- $_ := set $derived "project_id" (index $derived "project") -}}
    {{- end }}
    {{- $derivedScopes = append $derivedScopes (omit $derived "project") -}}
  {{- end }}
{{- end }}
{{- $_ := set $cfg "s3_credentials" $renderCreds -}}
{{- $_ := set $cfg "bucket_scopes" (concat $existingScopes $derivedScopes) -}}
{{- $auth := deepCopy (get $cfg "auth" | default dict) -}}
{{- if and (eq (get $auth "mode" | default "" | toString) "gen3") (not (get $auth "fence_url")) -}}
  {{- $fenceURL := include "syfon.fenceURL" . -}}
  {{- if $fenceURL -}}
    {{- $_ := set $auth "fence_url" $fenceURL -}}
    {{- $_ := set $cfg "auth" $auth -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "syfon.fullname" . }}-config
  labels:
    {{- include "syfon.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
{{ toYaml $cfg | nindent 4 }}
