{{- $cfg := deepCopy (.Values.config | default dict) -}}
{{- if .Values.credential_encryption -}}
  {{- $_ := set $cfg "credential_encryption" (deepCopy .Values.credential_encryption) -}}
{{- end -}}
{{- $credentialEncryption := (get $cfg "credential_encryption" | default dict) -}}
{{- $masterKey := (get $credentialEncryption "master_key" | default "" | toString | trim) -}}
{{- $localKeyFile := (get $credentialEncryption "local_key_file" | default "" | toString | trim) -}}
{{- if and (.Values.credentialEncryption.requireStableKey | default true) (not $masterKey) (not $localKeyFile) -}}
  {{- fail "syfon.config.credential_encryption.master_key or syfon.config.credential_encryption.local_key_file is required; refusing to deploy with pod-local generated credential encryption key" -}}
{{- end -}}
{{- $inputBuckets := default (list) (index $cfg "buckets") -}}
{{- if and (eq (len $inputBuckets) 0) (hasKey $cfg "s3_credentials") -}}
  {{- $inputBuckets = default (list) (index $cfg "s3_credentials") -}}
{{- end -}}
{{- $_ := set $cfg "buckets" $inputBuckets -}}
{{- $_ := unset $cfg "s3_credentials" -}}
{{- $auth := deepCopy (get $cfg "auth" | default dict) -}}
{{- if and (eq (get $auth "mode" | default "" | toString) "gen3") (not (get $auth "fence_url")) -}}
  {{- $fenceURL := include "syfon.fenceURL" . -}}
  {{- if $fenceURL -}}
    {{- $_ := set $auth "fence_url" $fenceURL -}}
    {{- $_ := set $cfg "auth" $auth -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "syfon.fullname" . }}-config
  labels:
    {{- include "syfon.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
{{ toYaml $cfg | nindent 4 }}
