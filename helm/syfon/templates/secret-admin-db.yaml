{{- if and .Values.postgres.initJob.enabled (not .Values.postgres.admin.existingSecret) }}
{{- $global := (.Values.global | default dict) -}}
{{- $pg := (get $global "postgres" | default dict) -}}
{{- $master := (get $pg "master" | default dict) -}}
{{- $globalMasterHost := (get $master "host" | default "") -}}
{{- $globalMasterPort := (get $master "port" | default "5432") -}}
{{- $globalMasterUser := (get $master "username" | default "postgres") -}}
{{- $globalMasterPass := (get $master "password" | default "") -}}
{{- $releasePostgresHost := printf "%s-postgresql" .Release.Name -}}
{{- $resolvedHost := (coalesce .Values.postgres.admin.host $globalMasterHost $releasePostgresHost) -}}
{{- $resolvedPort := (coalesce .Values.postgres.admin.port $globalMasterPort "5432") -}}
{{- $resolvedUser := (coalesce .Values.postgres.admin.username $globalMasterUser "postgres") -}}
{{- $resolvedPass := (coalesce .Values.postgres.admin.password $globalMasterPass "") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.admin.secretName }}
  labels:
    {{- include "syfon.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  host: {{ $resolvedHost | quote }}
  port: {{ $resolvedPort | quote }}
  username: {{ $resolvedUser | quote }}
  password: {{ $resolvedPass | quote }}
  database: {{ .Values.postgres.admin.database | quote }}
{{- end }}
