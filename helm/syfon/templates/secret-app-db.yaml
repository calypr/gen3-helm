{{- if not .Values.postgres.app.existingSecret }}
{{- $global := (.Values.global | default dict) -}}
{{- $pg := (get $global "postgres" | default dict) -}}
{{- $master := (get $pg "master" | default dict) -}}
{{- $globalMasterHost := (get $master "host" | default "") -}}
{{- $globalMasterPort := (get $master "port" | default "5432") -}}
{{- $releasePostgresHost := printf "%s-postgresql" .Release.Name -}}
{{- $resolvedHost := (coalesce .Values.postgres.app.db_host $globalMasterHost $releasePostgresHost) -}}
{{- $resolvedPort := (coalesce .Values.postgres.app.db_port $globalMasterPort "5432") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.app.secretName }}
  labels:
    {{- include "syfon.labels" . | nindent 4 }}
  {{- if .Values.postgres.initJob.enabled }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
  {{- end }}
type: Opaque
stringData:
  db_host: {{ $resolvedHost | quote }}
  db_port: {{ $resolvedPort | quote }}
  db_username: {{ .Values.postgres.app.db_username | quote }}
  db_password: {{ .Values.postgres.app.db_password | quote }}
  db_database: {{ .Values.postgres.app.db_database | quote }}
  db_sslmode: {{ .Values.postgres.app.db_sslmode | quote }}
{{- end }}
