apiVersion: apps/v1
kind: Deployment
metadata:
  name: arangodb
  labels:
    app.kubernetes.io/name: arangodb
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: arangodb
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arangodb
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: arangodb
          image: {{ .Values.arango.image | quote }}
          env:
            - name: ARANGO_NO_AUTH
              value: {{ ternary "1" "0" .Values.arango.noAuth | quote }}
          ports:
            - name: http
              containerPort: 8529
          volumeMounts:
            - name: data
              mountPath: /var/lib/arangodb3
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: arangodb
  labels:
    app.kubernetes.io/name: arangodb
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: arangodb
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8529
      targetPort: http
