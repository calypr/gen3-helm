{{- $cfg := deepCopy (.Values.config | default dict) -}}
{{- $server := deepCopy (get $cfg "server" | default dict) -}}
{{- if not (hasKey $server "listen") }}{{- $_ := set $server "listen" (printf ":%v" .Values.service.port) -}}{{- end }}
{{- if not (hasKey $server "schema") }}{{- $_ := set $server "schema" "/app/schemas/graph-fhir.json" -}}{{- end }}
{{- if not (hasKey $server "database") }}{{- $_ := set $server "database" .Values.server.arango.database -}}{{- end }}
{{- $arango := deepCopy (get $server "arango" | default dict) -}}
{{- if not (get $arango "url" | default "") }}{{- $_ := set $arango "url" (include "loom.arangoURL" .) -}}{{- end }}
{{- $_ := set $server "arango" $arango -}}
{{- $clickhouse := deepCopy (get $server "clickhouse" | default dict) -}}
{{- $clickhouseEnabled := and .Values.server.clickhouse.enabled (or .Values.clickstack.enabled (ne .Values.server.clickhouse.url "clickhouse://clickhouse:9000")) -}}
{{- $_ := set $clickhouse "enabled" $clickhouseEnabled -}}
{{- if $clickhouseEnabled }}
{{- $_ := set $clickhouse "username" .Values.clickstack.auth.username -}}
{{- $_ := set $clickhouse "password" .Values.clickstack.auth.password -}}
{{- end }}
{{- if $clickhouseEnabled }}
{{- if not (get $clickhouse "url" | default "") }}{{- $_ := set $clickhouse "url" (include "loom.clickhouseURL" .) -}}{{- end }}
{{- else }}
{{- $_ := set $clickhouse "url" "" -}}
{{- end }}
{{- if not (get $clickhouse "database" | default "") }}{{- $_ := set $clickhouse "database" .Values.server.clickhouse.database -}}{{- end }}
{{- $_ := set $server "clickhouse" $clickhouse -}}
{{- $_ := set $cfg "server" $server -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "loom.fullname" . }}-config
  labels:
    {{- include "loom.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
{{ toYaml $cfg | nindent 4 }}
