apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "loom.fullname" . }}-test-connection"
  labels:
    {{- include "loom.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command: ["wget"]
      args: ["-q", "-O", "-", "http://{{ include "loom.fullname" . }}:{{ .Values.service.port }}/healthz"]
