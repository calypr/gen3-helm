replicaCount: 1

image:
  repository: quay.io/ohsu-comp-bio/loom
  tag: main
  pullPolicy: IfNotPresent
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

service:
  type: ClusterIP
  port: 8080

server:
  listen: ":8080"
  noAuth: false
  datasetGenerations: false
  schema: /app/schemas/graph-fhir.json
  arango:
    # Override only when the Loom-provided ArangoDB service is replaced.
    url: ""
    database: fhir_proto
  clickhouse:
    url: ""
    host: ""
    port: 9000
    database: default
  waitForBackends: false
  extraArgs: []

# Rendered into /etc/loom/config.yaml. The Gen3 umbrella uses Calypr/Fence
# authorization by default; standalone deployments may set mode: basic and
# provide credentials through an existing Secret-backed environment.
config:
  auth:
    mode: calypr
    calypr:
      request_timeout: 5s
      cache_ttl: 30s

auth:
  basic:
    # Optional Secret for standalone mode. The server reads these via
    # LOOM_AUTH_BASIC_USERNAME/PASSWORD; credentials are never rendered into
    # config.yaml.
    existingSecret: ""
    usernameKey: username
    passwordKey: password

probes:
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 6

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

arango:
  image: arangodb:3.12
  noAuth: true

clickstackOperators:
  enabled: true

clickstack:
  enabled: true
